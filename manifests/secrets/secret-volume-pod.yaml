apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
  namespace: learning
  labels:
    app: secret-volume-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/app-secret
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: app-secret
